  # ========== BASEROW (АКТИВЕН) ==========
  baserow:
    image: baserow/baserow:latest
    container_name: baserow
    restart: "no"
    ports:
      - "8000:80"
    environment:
      - BASEROW_PUBLIC_URL=http://localhost:8000
      - BASEROW_CADDY_ADDRESSES=:80
      - BASEROW_HOST=0.0.0.0
      - BASEROW_ALLOWED_HOSTS=*
      - DATABASE_PASSWORD
      - REDIS_PASSWORD
    volumes:
      - ./baserow_data:/baserow/data
    depends_on:
      - baserow-postgres
      - baserow-redis
    networks:
      - ai-network

  baserow-postgres:
    image: postgres:15
    container_name: baserow-postgres
    restart: "no"
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD
      - POSTGRES_USER=baserow
      - POSTGRES_DB=baserow
    volumes:
      - ./baserow_postgres_data:/var/lib/postgresql/data
    networks:
      - ai-network

  baserow-redis:
    image: redis:7-alpine
    container_name: baserow-redis
    restart: "no"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD
    volumes:
      - ./baserow_redis_data:/data
    networks:
      - ai-network

  # ========== QDRANT (АКТИВЕН) ==========
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: "no"
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
    networks:
      - ai-network

